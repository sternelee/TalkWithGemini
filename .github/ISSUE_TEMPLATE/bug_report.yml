name: Bug report
description: Report a reproducible problem in Neo Chat.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please avoid posting API keys, access passwords, or private chat data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the shortest reproducible path.
      placeholder: |
        1. Open ...
        2. Configure ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, deployment target, Node.js version, and pnpm version.
      placeholder: |
        Browser:
        OS:
        Deployment: local / Docker / Cloudflare Workers
        Node.js:
        pnpm:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Add relevant logs or screenshots after removing secrets.
      render: shell
